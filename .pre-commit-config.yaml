repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/.*\.tsbuildinfo$
      - id: end-of-file-fixer
        exclude: ^frontend/.*\.tsbuildinfo$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: secret-scan-pr-range
        name: secret scan PR range
        entry: bash -lc 'bash scripts/security/run-gitleaks-pr-range.sh origin/main'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: backend-black-format
        name: backend black format
        entry: uv run black
        language: system
        files: \.py$
      - id: frontend-static-lint
        name: frontend static lint
        entry: bash -lc 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-type-check
        name: frontend type check
        entry: bash -lc 'cd frontend && npm run type-check'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-unit-tests
        name: frontend unit tests
        entry: bash -lc 'cd frontend && npm run test'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: backend-type-check
        name: backend type check
        entry: bash -lc 'uv run mypy app/ && uv run pyright app/ && uv run ty check app'
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: backend-unit-tests
        name: backend unit tests
        entry: bash -lc 'uv run pytest -v -m "not integration"'
        language: system
        pass_filenames: false
        stages: [pre-push]
