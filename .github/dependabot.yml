version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 4
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python:uv"
    groups:
      backend-non-major:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      backend-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/Santiago"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(frontend-deps)"
    labels:
      - "dependencies"
      - "javascript"
    groups:
      frontend-non-major:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Santiago"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-non-major:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
