name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      heavy_market_scope:
        description: "Manual heavy market-scope integration suite"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - 100
          - 200
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_VERSION: 8.30.1

  backend:
    name: Backend Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_finance_management_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_finance_management_ci
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: uv sync --all-groups

      - name: Lint
        run: |
          uv run ruff check .
          uv run black . --check --diff

      - name: Type checks
        run: |
          uv run mypy app/
          uv run pyright app/
          uv run ty check app

      - name: Security scan
        run: |
          uv run bandit -c pyproject.toml -r app --severity-level high --confidence-level high
          uv run pip-audit --progress-spinner=off --ignore-vuln CVE-2026-4539

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Unit and integration tests
        run: |
          uv run pytest -v -m "not integration"
          uv run pytest -v -m "integration and not market_scope_heavy and not market_scope_very_heavy"

      - name: Manual heavy market-scope tests (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.heavy_market_scope != 'none'
        run: |
          if [[ "${{ github.event.inputs.heavy_market_scope }}" == "100" ]]; then
            uv run pytest -v -m "integration and market_scope_heavy"
          elif [[ "${{ github.event.inputs.heavy_market_scope }}" == "200" ]]; then
            uv run pytest -v -m "integration and market_scope_very_heavy"
          else
            uv run pytest -v -m "integration and (market_scope_heavy or market_scope_very_heavy)"
          fi

  frontend:
    name: Frontend Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
